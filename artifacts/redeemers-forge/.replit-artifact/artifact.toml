kind = "web"
previewPath = "/"
title = "The Redeemer's Forge"
version = "1.0.0"
id = "artifacts/redeemers-forge"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 24632

[services.development]
run = "pnpm --filter @workspace/redeemers-forge run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/redeemers-forge", "run", "build" ]
publicDir = "artifacts/redeemers-forge/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "24632"
BASE_PATH = "/"
